server:
  port: 8081

spring:
  application:
    name: team3-backend-hr
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  profiles:
    include: db, secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${HR_KAFKA_CONSUMER_GROUP_ID:team3-hr}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer


    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.ohgiraffers.team3backendhr
  configuration:
    map-underscore-to-camel-case: true

# External Service Clients
feign:
  admin:
    url: ${FEIGN_ADMIN_URL:http://localhost:8080}
  scm:
    url: ${FEIGN_SCM_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# Scheduler
scheduler:
  notice-publish-cron: "0 * * * * *"
  notice-expire-cron:  "0 * * * * *"
